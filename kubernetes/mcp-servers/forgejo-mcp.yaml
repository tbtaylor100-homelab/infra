apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-mcp
  namespace: mcp-servers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-mcp
  template:
    metadata:
      labels:
        app: forgejo-mcp
    spec:
      containers:
        - name: forgejo-mcp
          image: ghcr.io/github/github-mcp-server:latest
          # Use 'sse' instead of 'streamable-http'
          args: ["sse"]
          ports:
            - containerPort: 8080
          env:
            - name: GITHUB_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: mcp-servers-config
                  key: FORGEJO_URL
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-mcp-secret
                  key: token
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-mcp
  namespace: mcp-servers
spec:
  type: LoadBalancer
  selector:
    app: forgejo-mcp
  ports:
    - port: 8080
      targetPort: 8080
