apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-mcp
  namespace: mcp-servers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-mcp
  template:
    metadata:
      labels:
        app: forgejo-mcp
    spec:
      containers:
        - name: forgejo-mcp
          image: node:22-alpine
          command: ["/bin/sh", "-c"]
          args: 
            - |
              apk add --no-cache git
              # Use a standalone repo instead of the giant monorepo
              git clone https://github.com/joshuatz/forgejo-mcp.git /app
              cd /app
              npm install
              npm run build
              # NOW mcp-proxy can actually run because the files exist
              npx -y mcp-proxy --port 8080 -- node dist/index.js
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-mcp
  namespace: mcp-servers
spec:
  type: LoadBalancer
  selector:
    app: forgejo-mcp
  ports:
    - port: 8080
      targetPort: 8080
