apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-mcp
  namespace: mcp-servers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-mcp
  template:
    metadata:
      labels:
        app: forgejo-mcp
    spec:
      containers:
        - name: forgejo-mcp
          image: node:22-alpine
          command: ["/bin/sh", "-c"]
          args: 
            - |
              apk add --no-cache git
              git clone https://github.com/modelcontextprotocol/servers.git /temp
              # In the current monorepo, the path is /src/github
              cp -r /temp/src/github /app
              cd /app
              npm install
              npm run build
              # Check what was built to be sure
              ls -R dist
              npx -y mcp-proxy --port 8080 -- node dist/index.js
          ports:
            - containerPort: 8080
          env:
            - name: GITHUB_PERSONAL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-mcp-secret
                  key: token
            - name: GITHUB_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: mcp-servers-config
                  key: FORGEJO_URL
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-mcp
  namespace: mcp-servers
spec:
  type: LoadBalancer
  selector:
    app: forgejo-mcp
  ports:
    - port: 8080
      targetPort: 8080
