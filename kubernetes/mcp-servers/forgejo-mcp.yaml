apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-mcp
  namespace: mcp-servers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo-mcp
  template:
    metadata:
      labels:
        app: forgejo-mcp
    spec:
      containers:
        - name: forgejo-mcp
          image: ronmi/forgejo-mcp:latest
          # This image is built to be a network server natively
          args: ["http", "--address", ":8080"]
          ports:
            - containerPort: 8080
          env:
            - name: FORGEJOMCP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forgejo-mcp-secret
                  key: token
            - name: FORGEJOMCP_SERVER
              valueFrom:
                configMapKeyRef:
                  name: mcp-servers-config
                  key: FORGEJO_URL
---
apiVersion: v1
kind: Service
metadata:
  name: forgejo-mcp
  namespace: mcp-servers
spec:
  type: LoadBalancer
  selector:
    app: forgejo-mcp
  ports:
    - port: 8080
      targetPort: 8080
