apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
spec:
  project: default
  source:
    # OpenBao Helm chart — verify latest version at https://github.com/openbao/openbao-helm/releases
    repoURL: https://openbao.github.io/openbao
    chart: openbao
    targetRevision: "0.9.0"
    helm:
      values: |
        server:
          ha:
            enabled: false

          standalone:
            enabled: true
            config: |
              ui = true

              listener "tcp" {
                tls_disable     = 1
                address         = "[::]:8200"
                cluster_address = "[::]:8201"
              }

              storage "file" {
                path = "/vault/data"
              }

          dataStorage:
            enabled: true
            size: 1Gi
            storageClass: "local-path"

          # LoadBalancer with pinned MetalLB IP so the runner on .50 can always reach it
          service:
            type: LoadBalancer
            annotations:
              metallb.universe.tf/loadBalancerIPs: "192.168.1.210"

          serviceAccount:
            create: true
            name: "openbao"

        # Vault Agent Injector not needed — secrets are injected via CLI in CI workflows
        injector:
          enabled: false

        ui:
          enabled: true
          serviceType: ClusterIP

  destination:
    server: https://kubernetes.default.svc
    namespace: openbao

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
