apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openbao
  namespace: argocd
spec:
  project: default
  source:
    # OpenBao Helm chart — https://github.com/openbao/openbao-helm/releases
    repoURL: https://openbao.github.io/openbao-helm
    chart: openbao
    targetRevision: "0.26.2"
    helm:
      values: |
        server:
          ha:
            enabled: false

          standalone:
            enabled: true
            config: |
              ui = true

              listener "tcp" {
                tls_disable     = 1
                address         = "[::]:8200"
                cluster_address = "[::]:8201"
              }

              storage "file" {
                path = "/openbao/data"
              }

          dataStorage:
            enabled: true
            size: 1Gi
            storageClass: "local-path"

          # LoadBalancer with pinned MetalLB IP so the runner on .50 can always reach it
          service:
            type: LoadBalancer
            annotations:
              metallb.universe.tf/loadBalancerIPs: "192.168.1.210"

          serviceAccount:
            create: true
            name: "openbao"

          # Sidecar that unseals OpenBao automatically after pod restarts.
          # Reads the unseal key from the openbao-unseal-key K8s Secret (not in git).
          extraContainers:
            - name: auto-unseal
              image: curlimages/curl:8.11.1
              command:
                - /bin/sh
                - -c
                - |
                  echo "Auto-unseal sidecar started"
                  until curl -sf http://127.0.0.1:8200/v1/sys/health > /dev/null 2>&1; do
                    echo "Waiting for OpenBao to be ready..."
                    sleep 5
                  done
                  while true; do
                    SEALED=$(curl -sf http://127.0.0.1:8200/v1/sys/health | grep -o '"sealed":[a-z]*' | cut -d: -f2)
                    if [ "$SEALED" = "true" ]; then
                      echo "OpenBao is sealed -- unsealing..."
                      curl -sf -X POST http://127.0.0.1:8200/v1/sys/unseal \
                        -H "Content-Type: application/json" \
                        -d "{\"key\": \"$(cat /vault/unseal/key)\"}"
                      echo "Unseal attempt complete"
                    fi
                    sleep 30
                  done
              volumeMounts:
                - name: userconfig-openbao-unseal-key
                  mountPath: /vault/unseal
                  readOnly: true

          extraVolumes:
            - type: secret
              name: openbao-unseal-key

        # Vault Agent Injector not needed — secrets are injected via CLI in CI workflows
        injector:
          enabled: false

        ui:
          enabled: true
          serviceType: ClusterIP

  destination:
    server: https://kubernetes.default.svc
    namespace: openbao

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
