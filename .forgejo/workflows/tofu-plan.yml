name: OpenTofu Plan

on:
  pull_request:
    paths:
      - 'opentofu/**'

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        run: |
          curl -Lo /tmp/tofu.tar.gz https://github.com/opentofu/opentofu/releases/download/v1.9.0/tofu_1.9.0_linux_amd64.tar.gz
          tar -xzf /tmp/tofu.tar.gz -C /usr/local/bin tofu
          tofu version

      - name: Fetch secrets from OpenBao
        run: |
          # AppRole login — role_id is non-sensitive, secret_id is the protected credential
          RESPONSE=$(curl -sf --request POST \
            --header "Content-Type: application/json" \
            --data "{\"role_id\":\"${{ secrets.OPENBAO_ROLE_ID }}\",\"secret_id\":\"${{ secrets.OPENBAO_SECRET_ID }}\"}" \
            http://192.168.1.210:8200/v1/auth/approle/login)
          BAO_TOKEN=$(echo "$RESPONSE" | jq -r '.auth.client_token')

          # Read all CI secrets in one call
          SECRETS=$(curl -sf \
            --header "X-Vault-Token: $BAO_TOKEN" \
            http://192.168.1.210:8200/v1/secret/data/homelab/ci | jq -r '.data.data')

          PROXMOX_ENDPOINT=$(echo "$SECRETS"    | jq -r '.proxmox_endpoint')
          PROXMOX_API_TOKEN=$(echo "$SECRETS"   | jq -r '.proxmox_api_token')
          SSH_PUBLIC_KEY=$(echo "$SECRETS"      | jq -r '.ssh_public_key')
          SSH_PRIVATE_KEY=$(echo "$SECRETS"     | jq -r '.ssh_private_key')
          MINIO_ACCESS_KEY=$(echo "$SECRETS"    | jq -r '.minio_access_key')
          MINIO_SECRET_KEY=$(echo "$SECRETS"    | jq -r '.minio_secret_key')

          # Mask sensitive values so they never appear in runner logs
          echo "::add-mask::$PROXMOX_API_TOKEN"
          echo "::add-mask::$SSH_PRIVATE_KEY"
          echo "::add-mask::$MINIO_ACCESS_KEY"
          echo "::add-mask::$MINIO_SECRET_KEY"

          # Propagate to subsequent steps via GITHUB_ENV
          # ssh_private_key is multi-line — must use heredoc format
          {
            echo "TF_VAR_proxmox_endpoint=$PROXMOX_ENDPOINT"
            echo "TF_VAR_proxmox_api_token=$PROXMOX_API_TOKEN"
            echo "TF_VAR_ssh_public_key=$SSH_PUBLIC_KEY"
            echo "AWS_ACCESS_KEY_ID=$MINIO_ACCESS_KEY"
            echo "AWS_SECRET_ACCESS_KEY=$MINIO_SECRET_KEY"
            printf 'TF_VAR_ssh_private_key<<__EOF__\n%s\n__EOF__\n' "$SSH_PRIVATE_KEY"
          } >> $GITHUB_ENV

      - name: tofu fmt check
        working-directory: opentofu/stacks/k3s
        run: tofu fmt -check -recursive

      - name: tofu validate
        working-directory: opentofu/stacks/k3s
        run: tofu init -backend=false && tofu validate

      - name: tofu plan
        working-directory: opentofu/stacks/k3s
        run: |
          tofu init \
            -backend-config="access_key=${AWS_ACCESS_KEY_ID}" \
            -backend-config="secret_key=${AWS_SECRET_ACCESS_KEY}"
          tofu plan -no-color 2>&1 | tee /tmp/plan.txt

      - name: Post plan as PR comment
        run: |
          PLAN=$(cat /tmp/plan.txt)
          if [ ${#PLAN} -gt 60000 ]; then
            PLAN="...(truncated)\n$(echo "$PLAN" | tail -c 60000)"
          fi
          BODY=$(printf '## OpenTofu Plan\n```\n%s\n```' "$PLAN")
          curl -sf --request POST \
            --header "Content-Type: application/json" \
            --header "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            --data "$(jq -n --arg body "$BODY" '{"body": $body}')" \
            "${{ github.api_url }}/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"
