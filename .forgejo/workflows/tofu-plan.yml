name: OpenTofu Plan

on:
  pull_request:
    paths:
      - 'opentofu/**'

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.9.0"

      - name: tofu fmt check
        working-directory: opentofu/stacks/k3s
        run: tofu fmt -check -recursive

      - name: tofu init
        working-directory: opentofu/stacks/k3s
        run: tofu init -backend=false
        env:
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: tofu validate
        working-directory: opentofu/stacks/k3s
        run: tofu validate

      - name: tofu plan
        working-directory: opentofu/stacks/k3s
        run: tofu plan -no-color 2>&1 | tee /tmp/plan.txt
        env:
          TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## OpenTofu Plan\n```\n' + truncated + '\n```'
            });
