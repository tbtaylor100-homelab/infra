name: OpenTofu Plan

on:
  pull_request:
    paths:
      - 'opentofu/**'

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        run: |
          curl -Lo /tmp/tofu.tar.gz https://github.com/opentofu/opentofu/releases/download/v1.9.0/tofu_1.9.0_linux_amd64.tar.gz
          tar -xzf /tmp/tofu.tar.gz -C /usr/local/bin tofu
          tofu version

      - name: tofu fmt check
        working-directory: opentofu/stacks/k3s
        run: tofu fmt -check -recursive

      - name: tofu validate
        working-directory: opentofu/stacks/k3s
        run: tofu init -backend=false && tofu validate

      - name: tofu plan
        working-directory: opentofu/stacks/k3s
        run: |
          tofu init \
            -backend-config="access_key=${{ secrets.MINIO_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.MINIO_SECRET_KEY }}"
          tofu plan -no-color 2>&1 | tee /tmp/plan.txt
        env:
          TF_VAR_proxmox_endpoint: ${{ secrets.PROXMOX_ENDPOINT }}
          TF_VAR_proxmox_api_token: ${{ secrets.PROXMOX_API_TOKEN }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.slice(-60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## OpenTofu Plan\n```\n' + truncated + '\n```'
            });
