name: OpenTofu Apply

on:
  pull_request:
    paths:
      - 'opentofu/**'
      - '.forgejo/workflows/tofu-apply.yml'
      - '.forgejo/actions/fetch-openbao-secrets/**'
  push:
    branches:
      - main
    paths:
      - 'opentofu/**'

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    enable-openid-connect: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        run: |
          curl -Lo /tmp/tofu.tar.gz https://github.com/opentofu/opentofu/releases/download/v1.9.0/tofu_1.9.0_linux_amd64.tar.gz
          tar -xzf /tmp/tofu.tar.gz -C /usr/local/bin tofu
          tofu version

      - uses: ./.forgejo/actions/fetch-openbao-secrets
        with:
          role: ci-plan

      - name: tofu init
        working-directory: opentofu/stacks/k3s
        run: |
          tofu init \
            -backend-config="access_key=${AWS_ACCESS_KEY_ID}" \
            -backend-config="secret_key=${AWS_SECRET_ACCESS_KEY}"

      - name: tofu plan
        working-directory: opentofu/stacks/k3s
        run: tofu plan -no-color

  apply:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    enable-openid-connect: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        run: |
          curl -Lo /tmp/tofu.tar.gz https://github.com/opentofu/opentofu/releases/download/v1.9.0/tofu_1.9.0_linux_amd64.tar.gz
          tar -xzf /tmp/tofu.tar.gz -C /usr/local/bin tofu
          tofu version

      - uses: ./.forgejo/actions/fetch-openbao-secrets
        with:
          role: ci-apply

      - name: tofu init
        working-directory: opentofu/stacks/k3s
        run: |
          tofu init \
            -backend-config="access_key=${AWS_ACCESS_KEY_ID}" \
            -backend-config="secret_key=${AWS_SECRET_ACCESS_KEY}"

      - name: tofu apply
        working-directory: opentofu/stacks/k3s
        run: tofu apply -auto-approve -no-color

      - name: Verify k3s node is Ready
        run: |
          echo "$TF_VAR_ssh_private_key" > /tmp/id_ed25519
          chmod 600 /tmp/id_ed25519
          ssh -i /tmp/id_ed25519 -o StrictHostKeyChecking=no ubuntu@192.168.1.60 \
            "sudo k3s kubectl get nodes"
          rm -f /tmp/id_ed25519
