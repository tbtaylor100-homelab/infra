name: Build and Push RepoWise Image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/repowise/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Forgejo registry
        run: echo "${{ secrets.FORGEJO_REGISTRY_TOKEN }}" | docker login 192.168.1.50:3000 -u root --password-stdin

      - name: Build and push image
        working-directory: docker/repowise
        run: docker build -t 192.168.1.50:3000/root/repowise:0.2.1 . && docker push 192.168.1.50:3000/root/repowise:0.2.1
