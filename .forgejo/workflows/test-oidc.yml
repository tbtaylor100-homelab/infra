name: Test Forgejo OIDC

on:
  pull_request:

jobs:
  test-oidc:
    runs-on: ubuntu-latest
    enable-openid-connect: true
    steps:
      - uses: actions/checkout@v4

      - name: Decode and verify OIDC token claims
        run: |
          echo "TOKEN_URL: $ACTIONS_ID_TOKEN_REQUEST_URL"
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "ERROR: ACTIONS_ID_TOKEN_REQUEST_URL not set — runner does not support OIDC"
            exit 1
          fi

          OIDC_TOKEN=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=openbao" | jq -r '.value')

          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "ERROR: Failed to obtain OIDC token"
            exit 1
          fi

          echo "OIDC token obtained (length: ${#OIDC_TOKEN})"
          echo "$OIDC_TOKEN" | cut -d. -f2 | tr '_-' '/+' | awk '{l=length($0)%4; if(l==2) print $0"=="; else if(l==3) print $0"="; else print $0}' | base64 -d 2>/dev/null | jq '{iss, sub, repository, ref, workflow}'

      - name: Fetch secrets via composite action (tests production code path)
        uses: ./.forgejo/actions/fetch-openbao-secrets
        with:
          role: ci-plan

      - name: Verify secrets were injected into environment
        run: |
          if [ -z "$TF_VAR_proxmox_endpoint" ] || [ "$TF_VAR_proxmox_endpoint" = "null" ]; then
            echo "ERROR: proxmox_endpoint not injected by fetch-openbao-secrets action"
            exit 1
          fi
          echo "Successfully read proxmox_endpoint: $TF_VAR_proxmox_endpoint"

      - name: Verify ci-apply role rejects non-main branch (branch restriction enforcement)
        run: |
          OIDC_TOKEN=$(curl -sf \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=openbao" | jq -r '.value')

          HTTP_CODE=$(curl -s -o /tmp/bao-apply-response.json -w "%{http_code}" --request POST \
            --header "Content-Type: application/json" \
            --data "{\"jwt\":\"$OIDC_TOKEN\",\"role\":\"ci-apply\"}" \
            http://192.168.1.210:8200/v1/auth/jwt/login)

          echo "OpenBao ci-apply login HTTP status: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "ERROR: ci-apply should have been rejected on a non-main branch"
            exit 1
          fi

          echo "PASS: ci-apply correctly rejected this branch (ref=$(echo "$OIDC_TOKEN" | cut -d. -f2 | tr '_-' '/+' | awk '{l=length($0)%4; if(l==2) print $0"=="; else if(l==3) print $0"="; else print $0}' | base64 -d 2>/dev/null | jq -r '.ref'))"
