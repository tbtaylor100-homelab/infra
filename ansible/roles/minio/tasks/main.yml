---
- name: Create minio system user
  ansible.builtin.user:
    name: minio-user
    system: true
    shell: /sbin/nologin
    create_home: false
  become: true

- name: Create MinIO data directory
  ansible.builtin.file:
    path: "{{ minio_data_dir }}"
    state: directory
    owner: minio-user
    group: minio-user
    mode: '0750'
  become: true

- name: Download MinIO binary
  ansible.builtin.get_url:
    url: "https://dl.min.io/server/minio/release/linux-amd64/archive/minio.{{ minio_version }}"
    dest: /usr/local/bin/minio
    mode: '0755'
    owner: root
    group: root
  become: true
  notify: Restart minio

- name: Write MinIO environment config
  ansible.builtin.copy:
    dest: /etc/default/minio
    mode: '0640'
    owner: root
    group: minio-user
    content: |
      MINIO_VOLUMES="{{ minio_data_dir }}"
      MINIO_OPTS="--address :{{ minio_api_port }} --console-address :{{ minio_console_port }}"
      MINIO_ROOT_USER="{{ minio_root_user }}"
      MINIO_ROOT_PASSWORD="{{ minio_root_password }}"
  become: true
  no_log: true
  notify: Restart minio

- name: Install MinIO systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/minio.service
    mode: '0644'
    owner: root
    group: root
    content: |
      [Unit]
      Description=MinIO Object Storage
      Documentation=https://min.io/docs/minio/linux/index.html
      Wants=network-online.target
      After=network-online.target

      [Service]
      User=minio-user
      Group=minio-user
      EnvironmentFile=/etc/default/minio
      ExecStart=/usr/local/bin/minio server $MINIO_OPTS $MINIO_VOLUMES
      Restart=always
      RestartSec=5
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target
  become: true
  notify: Restart minio

- name: Enable and start MinIO
  ansible.builtin.systemd:
    name: minio
    enabled: true
    state: started
    daemon_reload: true
  become: true
