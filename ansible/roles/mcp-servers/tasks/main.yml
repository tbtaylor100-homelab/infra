---
# Imports locally-built MCP images directly into K3s containerd.
# Avoids any registry dependency — images are saved from Docker and imported via ctr.
# Must run before ArgoCD reconciles the mcp-servers Application.

- name: Save forgejo-mcp image to tar
  community.docker.docker_image:
    name: forgejo-mcp:latest
    archive_path: /tmp/forgejo-mcp.tar
    source: local
  become: true

- name: Save mcp-proxmox image to tar
  community.docker.docker_image:
    name: mcp-proxmox:latest
    archive_path: /tmp/mcp-proxmox.tar
    source: local
  become: true

- name: Import forgejo-mcp into K3s containerd
  ansible.builtin.command: k3s ctr images import /tmp/forgejo-mcp.tar
  changed_when: false
  become: true

- name: Import mcp-proxmox into K3s containerd
  ansible.builtin.command: k3s ctr images import /tmp/mcp-proxmox.tar
  changed_when: false
  become: true

- name: Create mcp-servers ConfigMap
  ansible.builtin.command: >
    k3s kubectl create configmap mcp-servers-config
    --namespace mcp-servers
    --from-literal=FORGEJO_URL={{ forgejo_url }}
    --from-literal=JIRA_URL={{ jira_url }}
    --from-literal=PROXMOX_HOST={{ proxmox_host }}
    --from-literal=PROXMOX_USER={{ proxmox_user }}
    --from-literal=PROXMOX_VERIFY_SSL={{ proxmox_verify_ssl }}
    --dry-run=client -o yaml
    | k3s kubectl apply -f -
  changed_when: false
  become: true

- name: Create mcp-servers namespace
  ansible.builtin.command: >
    k3s kubectl create namespace mcp-servers --dry-run=client -o yaml
    | k3s kubectl apply -f -
  changed_when: false
  become: true

- name: Create forgejo-mcp secret
  ansible.builtin.command: >
    k3s kubectl create secret generic forgejo-mcp-secret
    --namespace mcp-servers
    --from-literal=token={{ forgejo_mcp_token }}
    --dry-run=client -o yaml
    | k3s kubectl apply -f -
  changed_when: false
  become: true
  no_log: true

- name: Create atlassian-mcp secret
  ansible.builtin.command: >
    k3s kubectl create secret generic atlassian-mcp-secret
    --namespace mcp-servers
    --from-literal=username={{ jira_username }}
    --from-literal=api_token={{ jira_api_token }}
    --dry-run=client -o yaml
    | k3s kubectl apply -f -
  changed_when: false
  become: true
  no_log: true

- name: Create proxmox-mcp secret
  ansible.builtin.command: >
    k3s kubectl create secret generic proxmox-mcp-secret
    --namespace mcp-servers
    --from-literal=token_name={{ proxmox_mcp_token_name }}
    --from-literal=token_value={{ proxmox_mcp_token_value }}
    --dry-run=client -o yaml
    | k3s kubectl apply -f -
  changed_when: false
  become: true
  no_log: true
