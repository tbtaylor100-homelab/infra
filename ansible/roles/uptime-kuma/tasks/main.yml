---
- name: Install Docker dependencies
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true
  become: true

- name: Add Docker GPG key
  ansible.builtin.shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc
  become: true

- name: Add Docker apt repository
  ansible.builtin.shell: |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
    https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" \
    > /etc/apt/sources.list.d/docker.list
  args:
    creates: /etc/apt/sources.list.d/docker.list
  become: true

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: Configure Docker DNS
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "dns": ["192.168.1.1", "1.1.1.1"]
      }
    mode: '0644'
  become: true
  notify: Restart Docker

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  become: true

- name: Create Uptime Kuma data directory
  ansible.builtin.file:
    path: /opt/uptime-kuma
    state: directory
    mode: '0755'
  become: true

- name: Deploy Uptime Kuma docker-compose file
  ansible.builtin.copy:
    dest: /opt/uptime-kuma/docker-compose.yml
    mode: '0644'
    content: |
      services:
        uptime-kuma:
          image: louislam/uptime-kuma:1
          container_name: uptime-kuma
          restart: unless-stopped
          ports:
            - "3001:3001"
          volumes:
            - uptime-kuma-data:/app/data
      volumes:
        uptime-kuma-data:
  become: true

- name: Start Uptime Kuma
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: /opt/uptime-kuma
  changed_when: false
  become: true
