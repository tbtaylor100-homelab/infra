---
- name: Update apt cache and upgrade packages
  apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600
  become: true

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone }}"
  become: true

- name: Enable SSH password authentication
  copy:
    dest: /etc/ssh/sshd_config.d/70-homelab.conf
    content: |
      # Managed by Ansible — overrides 60-cloudimg-settings.conf
      PasswordAuthentication yes
    mode: '0644'
  become: true
  notify: Restart sshd

- name: Set ubuntu user password
  user:
    name: ubuntu
    password: "{{ ubuntu_password | password_hash('sha512') }}"
  become: true
  no_log: true

- name: Enable unattended security upgrades
  apt:
    name: unattended-upgrades
    state: present
  become: true

- name: Configure unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: '0644'
  become: true
