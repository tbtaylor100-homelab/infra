---
# --- Helm ---
- name: Install Helm
  ansible.builtin.shell: |
    curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  args:
    creates: /usr/local/bin/helm
  become: true

# --- MetalLB ---
- name: Add MetalLB Helm repo
  ansible.builtin.command: helm repo add metallb https://metallb.github.io/metallb
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  become: true

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  become: true

- name: Install MetalLB
  ansible.builtin.command: >
    helm upgrade --install metallb metallb/metallb
    --namespace metallb-system
    --create-namespace
    --wait
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  become: true

- name: Configure MetalLB IP pool
  ansible.builtin.copy:
    dest: /tmp/metallb-pool.yaml
    content: |
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: homelab-pool
        namespace: metallb-system
      spec:
        addresses:
          - 192.168.1.200-192.168.1.220
      ---
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: homelab-l2
        namespace: metallb-system

- name: Apply MetalLB IP pool
  ansible.builtin.command: k3s kubectl apply -f /tmp/metallb-pool.yaml
  changed_when: false
  become: true

# --- ArgoCD ---
- name: Add ArgoCD Helm repo
  ansible.builtin.command: helm repo add argo https://argoproj.github.io/argo-helm
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  become: true

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  become: true

- name: Install ArgoCD
  ansible.builtin.command: >
    helm upgrade --install argocd argo/argo-cd
    --namespace argocd
    --create-namespace
    --set server.service.type=LoadBalancer
    --wait
    --timeout 5m
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  changed_when: false
  become: true

- name: Wait for ArgoCD server to be Ready
  ansible.builtin.command: k3s kubectl rollout status deployment argocd-server -n argocd --timeout=5m
  changed_when: false
  become: true

- name: Fetch ArgoCD initial admin password
  ansible.builtin.command: >
    k3s kubectl -n argocd get secret argocd-initial-admin-secret
    -o jsonpath="{.data.password}"
  register: argocd_password_b64
  changed_when: false
  become: true

- name: Decode ArgoCD admin password
  ansible.builtin.shell: echo "{{ argocd_password_b64.stdout }}" | base64 -d
  register: argocd_password
  changed_when: false
  delegate_to: localhost

- name: Show ArgoCD admin password
  ansible.builtin.debug:
    msg: "ArgoCD admin password: {{ argocd_password.stdout }}"

- name: Get ArgoCD LoadBalancer IP
  ansible.builtin.command: >
    k3s kubectl -n argocd get svc argocd-server
    -o jsonpath="{.status.loadBalancer.ingress[0].ip}"
  register: argocd_ip
  changed_when: false
  become: true
  retries: 10
  delay: 10
  until: argocd_ip.stdout != ""

- name: Show ArgoCD URL
  ansible.builtin.debug:
    msg: "ArgoCD UI: https://{{ argocd_ip.stdout }} (user: admin)"
