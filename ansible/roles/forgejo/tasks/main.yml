---
- name: Set Forgejo image tag in docker-compose.yml
  ansible.builtin.lineinfile:
    path: "{{ forgejo_compose_dir }}/docker-compose.yml"
    regexp: '^\s+image: codeberg\.org/forgejo/forgejo:'
    line: "    image: {{ forgejo_image }}:{{ forgejo_image_tag }}"
  notify: restart forgejo container

- name: Wait for Forgejo API to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:3000/api/v1/version"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 12
  delay: 5
